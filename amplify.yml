version: 1
appRoot: AI-for-Bharat-kalaikatha
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  postBuild:
    commands:
      - echo "Build complete"
