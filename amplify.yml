version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  postBuild:
    commands:
      - echo "Build complete"
redirects:
  - source: '</^[^.]+$|\.(?!html?$)([^.]+$)/>'
    target: '/index.html'
    status: '200'
    queryParameters: {}
headers: []
