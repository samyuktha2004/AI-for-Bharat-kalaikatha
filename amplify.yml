version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd AI-for-Bharat-kalaikatha && npm install
    build:
      commands:
        - cd AI-for-Bharat-kalaikatha && npm run build
  artifacts:
    baseDirectory: AI-for-Bharat-kalaikatha/build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  postBuild:
    commands:
      - echo "Build complete"
